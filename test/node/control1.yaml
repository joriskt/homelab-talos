machine:
  network:
    hostname: control-1
    interfaces:
      # Internet only interface
      - interface: ens18
        dhcp: true
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.9.1

      # Cluster only interface
      - interface: ens19
        addresses:
          - 192.168.11.51/24
        routes:
          - network: 192.168.11.0/24
      
      # Storage only interface
      - interface: ens20
        dhcp: false
        addresses:
          - 192.168.3.51/24
        routes:
          - network: 192.168.3.0/24

    nameservers:
      - 192.168.5.10
      - 192.168.9.1
  nodeLabels:
    topology.kubernetes.io/region: eu-west-0
    topology.kubernetes.io/zone: home
    topology.joris.me/node: flat1
