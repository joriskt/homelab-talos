machine:
  network:
    hostname: worker-2
    interfaces:
      # Internet only interface
      - interface: ens18
        dhcp: true
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.9.1

      # Cluster only interface
      - interface: ens19
        addresses:
          - 192.168.11.62/24
        routes:
          - network: 192.168.11.0/24
            gateway: 192.168.11.1
          # DNS moet benaderd worden via het cluster netwerk ivm firewall regels.
          - network: 192.168.5.0/24
            gateway: 192.168.11.1

      # Storage only interface
      - interface: ens20
        dhcp: false
        addresses:
          - 192.168.3.62/24
        routes:
          - network: 192.168.3.0/24

    # Linkt naar Technitium.
    nameservers:
      - 192.168.5.11
      - 192.168.5.12
      - 192.168.5.13
  nodeLabels:
    topology.kubernetes.io/region: eu-west-0
    topology.kubernetes.io/zone: home
    topology.joris.me/node: nuc3
