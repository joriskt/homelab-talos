version: v1alpha1
# Enable verbose logging to the console.
debug: false
persist: true
# Provides machine specific configuration options.
machine:
    # Defines the role of the machine within the cluster.
    type: controlplane
    # secret: The `token` is used by a machine to join the PKI of the cluster.
    token: ENC[AES256_GCM,data:aDgnOYiLK5aS6JV0DCHOBDMNF+LuQw0=,iv:3KBM/IvfwJU4T7FtKMpQqaOpTNrtjn0I2TlnTNnDWPE=,tag:Cf7CvfiWG5sN6F02yRPZKw==,type:str]
