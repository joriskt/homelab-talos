# Indicates the schema used to decode the contents.
version: v1alpha1
# Enable verbose logging to the console.
debug: false
persist: true
# Provides machine specific configuration options.
machine:
    # Defines the role of the machine within the cluster.
    type: controlplane
    # secret: The `token` is used by a machine to join the PKI of the cluster.
    token: ENC[AES256_GCM,data:0uApLOWdcbLb8Btuq4rJQPYWXniJnT8=,iv:CSJAF3XGHK9q7HZzX1piWCxsWsLeN3cOvDtIDicufbk=,tag:HrmXl4FASb3G7vCfwvZGqA==,type:str]
