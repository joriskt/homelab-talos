        key: ENC[AES256_GCM,data:1+YuOy/0AmlHFVQp24Bhk4QgGwADNY59DmNylqF25/D/1XxddNuAWM9W5ySukaFCK0zhFhfU8xwDh6nt6X2Hv87Bxb8C46+efQRLYSZEGVe0AqAAfWsiV+j95weV/EmbIdUKEDPfUd6OFl8rM9WrqtS3DbLOHvWl4DcoxuxbKJYeHqsGjgSHnfBNPMIAM7xfvR7AmqpT/6o5snDpt/4vvl87tqS78VvoDtva3v1gQbjlN2TX,iv:C6h2kjTXSzj7b4Zsx8RnzdmlzajiJTss/tohZZUFjmg=,tag:OdR2TEICgfiVEZIunaOSrQ==,type:str]
    # Extra certificate subject alternative names for the machine's certificate.
    certSANs: []
