    # secret: Globally unique identifier for this cluster (base64 encoded random 32 bytes).
    id: ENC[AES256_GCM,data:lyzJjf/XGVucnBjLEwXGE1yCoGir4L89pKJANNgLLtZ0vO0V7We+F8u3eeQ=,iv:ZqYU8biQtZMfw9qEOhuBTUffMZBpSg64xrsQuMeoA08=,tag:lNPqxWWXg+2cG9pPHw0upA==,type:str]
    # secret: Shared secret of cluster (base64 encoded random 32 bytes).
    secret: ENC[AES256_GCM,data:Wd0+yLO2/EPd14ovUuzKImX7X8746f0GaDUdxmcVnOrRN3nVwcQjnWUlirk=,iv:8r6GNnfpA9m0tR0kfEH1wCQLq7hKE/HjUQCz1lyAvXw=,tag:leeAOkzWz1NWnXFYaz1p2g==,type:str]
    # Provides control plane specific configuration options.
    controlPlane:
